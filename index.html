<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROK RAIL PLAN</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
        }
        #map {
            width: 100vw;
            height: 100vh;
            z-index: 1; /* 지도 레이어 */
        }
        /* 내 위치 표시 버튼 스타일 */
        .location-btn {
            position: absolute;
            bottom: 30px;
            right: 20px;
            z-index: 1000; /* 지도 위에 표시되도록 높은 z-index 부여 */
            background-color: #ffffff;
            color: #333333;
            border: 2px solid rgba(0,0,0,0.2);
            border-radius: 8px;
            padding: 12px 20px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            transition: background-color 0.2s;
        }
        .location-btn:hover {
            background-color: #f0f0f0;
        }
    </style>
</head>
<body>

    <div id="map"></div>
    
    <button class="location-btn" onclick="findMyLocation()">🎯 내 위치 표시</button>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // 1. 지도 초기화 (기본 화면은 대한민국 중심)
        const map = L.map('map').setView([36.5, 127.5], 7);

        // 2. OpenStreetMap 배경 지도 추가
        const osmLayer = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 18,
            attribution: '&copy; OpenStreetMap contributors'
        }).addTo(map);

        // 3. 알려주신 국가철도망 계획도 이미지 URL 적용
        const imageUrl = 'https://www.kr.or.kr/boardCnts/fileDown.do?fileSeq=c110b4b90bb4cbc43976ed0d5ede4bd5'; 
        
        // 이미지 영역 좌표 (남서, 북동) - 필요시 투명도를 보며 미세 조정하세요.
        const imageBounds = [[33.8, 125.5], [38.7, 129.7]];
        
        // 이미지 오버레이 레이어 생성
        const imageOverlay = L.imageOverlay(imageUrl, imageBounds, {
            interactive: false
        }).addTo(map);

        // (옵션) 이전 대화의 OpenRailwayMap 선로 레이어도 껐다 켤 수 있게 추가
        const openRailwayMapLayer = L.tileLayer('https://{s}.tiles.openrailwaymap.org/standard/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '&copy; OpenRailwayMap'
        });

        // 우측 상단 레이어 켜기/끄기 컨트롤 추가
        L.control.layers(
            { "기본 지도": osmLayer }, 
            { 
                "국가철도망 이미지": imageOverlay,
                "실제 철도망 선로 (ORM)": openRailwayMapLayer 
            }, 
            { position: 'topright' }
        ).addTo(map);

        // 4. 내 위치 마커를 저장할 변수
        let userMarker = null;
        let userCircle = null;

        // 5. GPS 권한을 요구하고 내 위치를 표시하는 함수
        function findMyLocation() {
            if (!navigator.geolocation) {
                alert("현재 사용 중인 브라우저에서는 GPS 위치 정보를 지원하지 않습니다.");
                return;
            }

            // 사용자에게 위치 정보 권한을 요청합니다.
            navigator.geolocation.getCurrentPosition(
                function(position) {
                    const lat = position.coords.latitude;
                    const lng = position.coords.longitude;
                    const accuracy = position.coords.accuracy;

                    // 기존에 표시된 마커가 있다면 지도에서 지움
                    if (userMarker) map.removeLayer(userMarker);
                    if (userCircle) map.removeLayer(userCircle);

                    // 새로운 위치에 마커 생성
                    userMarker = L.marker([lat, lng]).addTo(map)
                        .bindPopup(`<b>현재 내 위치</b><br>오차 범위: 약 ${Math.round(accuracy)}m`).openPopup();
                    
                    // 오차 범위를 원형으로 표시 (빨간색)
                    userCircle = L.circle([lat, lng], {
                        color: '#e74c3c',
                        fillColor: '#e74c3c',
                        fillOpacity: 0.3,
                        radius: accuracy
                    }).addTo(map);

                    // 지도를 내 위치로 부드럽게 이동시키고 확대(zoom: 12)
                    map.flyTo([lat, lng], 12);
                },
                function(error) {
                    // 권한 거부 또는 에러 발생 시 처리
                    let msg = "위치 정보를 가져올 수 없습니다.";
                    if (error.code === 1) msg = "위치 정보 권한이 거부되었습니다. 브라우저 설정에서 위치(GPS) 권한을 허용해주세요.";
                    else if (error.code === 2) msg = "위치 정보를 사용할 수 없습니다. GPS 신호를 확인해주세요.";
                    else if (error.code === 3) msg = "위치 정보를 가져오는 데 시간이 초과되었습니다.";
                    alert(msg);
                },
                { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
            );
        }

        // 6. 페이지가 열릴 때 자동으로 한 번 위치 권한을 요구하고 내 위치를 찾음
        window.onload = function() {
            findMyLocation();
        };
    </script>
</body>
</html>
