<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>국가철도망</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
        }
        #map {
            width: 100vw;
            height: 100vh;
        }
    </style>
</head>
<body>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // 1. 지도 초기화
        const map = L.map('map').setView([36.5, 127.5], 7);

        // 2. 기본 배경 지도 (OpenStreetMap)
        const osmLayer = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 18,
            attribution: '&copy; OpenStreetMap contributors'
        }).addTo(map);

        // 3. OpenRailwayMap 철도망 레이어 추가 (알려주신 사이트의 데이터)
        const openRailwayMapLayer = L.tileLayer('https://{s}.tiles.openrailwaymap.org/standard/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: 'Map data: &copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors | Map style: &copy; <a href="https://www.OpenRailwayMap.org">OpenRailwayMap</a>'
        }).addTo(map);

        // 4. 기존: 제4차 국가철도망 이미지 오버레이 (필요시 사용)
        const imageUrl = 'https://www.kr.or.kr/boardCnts/fileDown.do?fileSeq=c110b4b90bb4cbc43976ed0d5ede4bd5'; 
        const imageBounds = [[34.0, 125.5], [38.6, 129.5]];
        const imageOverlayLayer = L.imageOverlay(imageUrl, imageBounds, {
            opacity: 0.5, // 0~1 사이로 투명도 조절
            interactive: false
        });
        
        // (선택) 초기에는 이미지를 띄우지 않고 싶다면 아래 줄을 주석 처리(//) 하세요.
        imageOverlayLayer.addTo(map);

        // 5. 레이어 컨트롤 추가 (우측 상단에서 껐다 켰다 할 수 있는 기능)
        const baseMaps = {
            "기본 지도 (OSM)": osmLayer
        };
        const overlayMaps = {
            "실제 철도망 (OpenRailwayMap)": openRailwayMapLayer,
            "철도망 계획도 이미지": imageOverlayLayer
        };
        L.control.layers(baseMaps, overlayMaps, { position: 'topright' }).addTo(map);


        // 6. 사용자 GPS 위치 추적 기능
        if ("geolocation" in navigator) {
            navigator.geolocation.getCurrentPosition(
                function(position) {
                    const lat = position.coords.latitude;
                    const lng = position.coords.longitude;
                    const accuracy = position.coords.accuracy;

                    const userMarker = L.marker([lat, lng]).addTo(map)
                        .bindPopup(`<b>현재 위치</b><br>오차 범위: 약 ${accuracy.toFixed(0)}m`).openPopup();

                    L.circle([lat, lng], {
                        color: '#007bff',
                        fillColor: '#007bff',
                        fillOpacity: 0.2,
                        radius: accuracy
                    }).addTo(map);
                }, 
                function(error) {
                    console.warn("GPS 정보를 가져오는데 실패했습니다.", error);
                }, 
                { enableHighAccuracy: true, timeout: 5000, maximumAge: 0 }
            );
        }
    </script>
</body>
</html>
