<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>포항 벚꽃 지도 🌸</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        /* 폰트 설정: LineSeed (700 Bold 기본) */
        @font-face {
            font-family: 'LineSeed'; 
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_11-01@1.0/LINESeedKR-Rg.woff2') format('woff2');
            font-weight: 400; font-display: swap;
        }
        @font-face {
            font-family: 'LineSeed'; 
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_11-01@1.0/LINESeedKR-Bd.woff2') format('woff2');
            font-weight: 700; font-display: swap;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'LineSeed', sans-serif;
            font-weight: 700;
            background: #fffaf0;
            color: #333;
            -webkit-font-smoothing: antialiased;
            overflow: hidden; /* 전체 스크롤 방지 (사이드바 내부 스크롤 사용) */
        }

        #container { 
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
        }

        /* [비율 조정] 지도 5.2 */
        #map { 
            width: 100%; 
            height: 52vh; 
            position: relative; 
            z-index: 1;
        }

        /* [비율 조정] 사이드바 4.8 */
        #sidebar { 
            height: 48vh;
            padding: 30px 20px; 
            overflow-y: auto; 
            background: #fff; 
            border-top: 4px solid #f0fdf4; 
            border-radius: 30px 30px 0 0; 
            margin-top: -30px; /* 자연스러운 겹침 효과 */
            z-index: 1000; 
            box-shadow: 0 -10px 20px rgba(0,0,0,0.05);
            box-sizing: border-box;
        }

        h1 { text-align: center; color: #e91e63; font-size: 24px; margin: 0 0 20px 0; }
        h2 { color: #2e7d32; font-size: 18px; margin: 25px 0 12px; display: flex; align-items: center; }
        h2::before { content: ""; display: inline-block; width: 5px; height: 18px; background: #a3e635; margin-right: 10px; border-radius: 3px; }

        ul { list-style: none; padding: 0; margin: 0; }
        li { 
            padding: 18px; margin-bottom: 12px; background: #f9fff9; border: 1.5px solid #eefae1; 
            border-radius: 18px; cursor: pointer; transition: all 0.2s; font-size: 16px;
        }
        li:active { transform: scale(0.98); background: #eefae1; }

        /* 커스텀 레이어 버튼 (AI 배색 그라데이션) */
        .map-layer-btn {
            position: absolute; top: 20px; right: 20px; z-index: 2000;
            width: 50px; height: 50px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
            border: none; outline: none;
        }
        .layer-street { background: #ffffff; color: #333; }
        .layer-satellite { 
            background: linear-gradient(135deg, #6366f1 0%, #a855f7 50%, #ec4899 100%); 
            color: #fff; 
        }

        /* 알약형 줌 컨트롤 */
        .zoom-pill {
            position: absolute; top: 85px; right: 20px; z-index: 2000;
            display: flex; flex-direction: column;
            background: #ffffff; border-radius: 25px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); overflow: hidden;
            width: 50px; border: 1px solid rgba(0,0,0,0.05);
        }
        .zoom-btn {
            height: 50px; border: none; background: transparent;
            font-size: 20px; font-weight: 700; color: #333;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
        }
        .zoom-btn:active { background: #f0f0f0; }
        .zoom-sep { height: 1px; background: #eee; margin: 0 10px; }

        .popup-content { font-family: 'LineSeed'; font-weight: 700; text-align: center; }
    </style>
</head>
<body>
    <div id="container">
        <div id="map">
            <button id="layerToggle" class="map-layer-btn layer-street" onclick="toggleLayer()">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10"></circle>
                    <line x1="2" y1="12" x2="22" y2="12"></line>
                    <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path>
                </svg>
            </button>

            <div class="zoom-pill">
                <button class="zoom-btn" onclick="map.zoomIn()">+</button>
                <div class="zoom-sep"></div>
                <button class="zoom-btn" onclick="map.zoomOut()">−</button>
            </div>
        </div>

        <div id="sidebar">
            <h1>포항 벚꽃 스팟 🌸</h1>
            <ul id="bukgu-list"></ul>
            <ul id="namgu-list"></ul>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const streetMap = L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', { attribution: '&copy; OSM' });
        const satelliteMap = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', { attribution: '&copy; Esri' });

        const map = L.map('map', {
            center: [36.0195, 129.3435],
            zoom: 11,
            layers: [streetMap],
            zoomControl: false
        });

        let isSatellite = false;
        function toggleLayer() {
            const btn = document.getElementById('layerToggle');
            if (!isSatellite) {
                map.removeLayer(streetMap);
                map.addLayer(satelliteMap);
                btn.className = 'map-layer-btn layer-satellite';
                isSatellite = true;
            } else {
                map.removeLayer(satelliteMap);
                map.addLayer(streetMap);
                btn.className = 'map-layer-btn layer-street';
                isSatellite = false;
            }
        }

        const spots = [
            { district: "북구", name: "경상북도수목원", address: "포항시 북구 죽장면 상옥리 산2-47", lat: 36.1408, lon: 129.2503 },
            { district: "북구", name: "덕동문화마을", address: "포항시 북구 기북면 오덕리 210", lat: 36.1285, lon: 129.2721 },
            { district: "북구", name: "월포초등학교", address: "포항시 북구 청하면 월포리 306", lat: 36.1682, lon: 129.3054 },
            { district: "북구", name: "창포지(마장지)", address: "포항시 북구 창흥로 117", lat: 36.0321, lon: 129.3587 },
            { district: "북구", name: "칠포그린로즈", address: "포항시 북구 흥해읍 암각화길 31", lat: 36.0824, lon: 129.3756 },
            { district: "북구", name: "한동대학교", address: "포항시 북구 흥해읍 남송리 3", lat: 36.1028, lon: 129.3880 },
            { district: "북구", name: "환호공원", address: "포항시 북구 환호동 347", lat: 36.0535, lon: 129.3752 },
            { district: "남구", name: "구룡포병포교차로길", address: "포항시 남구 구룡포읍 병포리", lat: 35.9704, lon: 129.4308 },
            { district: "남구", name: "영일대호수공원", address: "포항시 남구 행복길 75", lat: 36.0251, lon: 129.3554 },
            { district: "남구", name: "오어사", address: "포항시 남구 오천읍 항사리 산 28-14", lat: 35.9847, lon: 129.3802 },
            { district: "남구", name: "철길숲", address: "포항시 남구 대잠동 171-5", lat: 36.0148, lon: 129.3412 },
            { district: "남구", name: "청송대둘레길", address: "포항시 남구 행복길 58-10", lat: 36.0203, lon: 129.3457 },
            { district: "남구", name: "포항공과대학교", address: "포항시 남구 청암로 77", lat: 36.0128, lon: 129.3256 },
            { district: "남구", name: "포항시청", address: "포항시 남구 대잠동 1001", lat: 36.0195, lon: 129.3435 },
            { district: "남구", name: "효곡동", address: "포항시 남구 효자동길 30", lat: 36.0087, lon: 129.3301 }
        ];

        const greenPinIcon = L.divIcon({
            className: 'custom-pin',
            html: `<svg width="34" height="46" viewBox="0 0 30 42" fill="none" style="filter: drop-shadow(0 3px 5px rgba(0,0,0,0.2))"><path d="M15 0C6.71573 0 0 6.71573 0 15C0 26.25 15 42 15 42C15 42 30 26.25 30 15C30 6.71573 23.2843 0 15 0Z" fill="#a3e635"/><circle cx="15" cy="15" r="6" fill="white"/></svg>`,
            iconSize: [34, 46], iconAnchor: [17, 46], popupAnchor: [0, -42]
        });

        const bukguList = document.getElementById('bukgu-list');
        const namguList = document.getElementById('namgu-list');

        // 리스트 타이틀을 UL 안이 아니라 JS로 동적 추가 (가독성 유지)
        const addSection = (list, title) => {
            const h2 = document.createElement('h2');
            h2.textContent = title;
            list.parentNode.insertBefore(h2, list);
        };
        addSection(bukguList, "북구 주요 명소");
        addSection(namguList, "남구 주요 명소");

        spots.forEach((spot) => {
            const marker = L.marker([spot.lat, spot.lon], { icon: greenPinIcon }).addTo(map);
            marker.bindPopup(`<div class="popup-content"><strong>${spot.name}</strong><br><small style="color:#666">${spot.address}</small></div>`);
            
            const li = document.createElement('li');
            li.innerHTML = `<strong>${spot.name}</strong><br><small style="color:#888; font-weight:400;">${spot.address}</small>`;
            li.onclick = () => {
                map.flyTo([spot.lat, spot.lon], 16, { duration: 1.5 });
                marker.openPopup();
                // 사이드바 내부가 아닌 페이지 최상단(지도가 있는 곳)으로 이동
                document.getElementById('map').scrollIntoView({ behavior: 'smooth' });
            };
            (spot.district === "북구" ? bukguList : namguList).appendChild(li);
        });
    </script>
</body>
</html>
