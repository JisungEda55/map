<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>포항 벚꽃 지도 🌸 (위성뷰 포함)</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        /* [폰트 및 기본 스타일은 이전과 동일] */
        @font-face {
            font-family: 'LineSeed'; 
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_11-01@1.0/LINESeedKR-Rg.woff2') format('woff2');
            font-weight: 400; font-display: swap;
        }
        body { margin: 0; padding: 0; font-family: 'LineSeed', sans-serif; background: #fffaf0; }
        #container { display: flex; flex-direction: column; height: 100vh; }
        #map { width: 100%; height: 45vh; z-index: 10; }
        #sidebar { flex: 1; padding: 20px; overflow-y: auto; background: #fff; border-top: 4px solid #f0fdf4; border-radius: 25px 25px 0 0; margin-top: -20px; z-index: 20; }
        h1 { text-align: center; color: #e91e63; font-size: 22px; margin-bottom: 5px; }
        .subtitle { text-align: center; color: #666; font-size: 14px; margin-bottom: 20px; }
        h2 { color: #2e7d32; font-size: 17px; margin: 20px 0 10px; display: flex; align-items: center; }
        h2::before { content: ""; display: inline-block; width: 4px; height: 16px; background: #a3e635; margin-right: 8px; border-radius: 2px; }
        ul { list-style: none; padding: 0; }
        li { padding: 15px; margin-bottom: 10px; background: #f9fff9; border: 1px solid #eefae1; border-radius: 15px; cursor: pointer; font-size: 15px; }
        .custom-pin { display: flex; justify-content: center; align-items: center; }
        .popup-content { font-family: 'LineSeed', sans-serif; text-align: center; }
    </style>
</head>
<body>
    <div id="container">
        <div id="map"></div>
        <div id="sidebar">
            <h1>포항 벚꽃 스팟 🌸</h1>
            <p class="subtitle">오른쪽 상단 버튼으로 위성 지도를 켤 수 있습니다!</p>
            <h2>북구 주요 명소</h2>
            <ul id="bukgu-list"></ul>
            <h2>남구 주요 명소</h2>
            <ul id="namgu-list"></ul>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // 1. 맵 타일 설정 (무료 위성 지도 포함)
        
        // (A) 일반 라이트 모드 (CartoDB)
        const streetMap = L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; OpenStreetMap'
        });

        // (B) 위성 지도 모드 (Esri World Imagery)
        const satelliteMap = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
            attribution: 'Tiles &copy; Esri &mdash; Source: Esri, i-cubed, USDA, USGS, AEX, GeoEye, Getmapping, Aerogrid, IGN, IGP, UPR-EBP, and the GIS User Community'
        });

        // 지도 초기화 (기본으로 streetMap 설정)
        const map = L.map('map', {
            center: [36.0195, 129.3435],
            zoom: 11,
            layers: [streetMap] // 초기 레이어
        });

        // 레이어 컨트롤 추가 (우측 상단에서 전환 가능)
        const baseMaps = {
            "일반 지도": streetMap,
            "위성 지도": satelliteMap
        };
        L.control.layers(baseMaps).addTo(map);

        // [데이터 및 마커 생성 로직은 이전과 동일]
        const spots = [
            { district: "북구", name: "경상북도수목원", address: "포항시 북구 죽장면 상옥리 산2-47", lat: 36.1408, lon: 129.2503 },
            { district: "북구", name: "덕동문화마을", address: "포항시 북구 기북면 오덕리 210", lat: 36.1285, lon: 129.2721 },
            { district: "북구", name: "월포초등학교", address: "포항시 북구 청하면 월포리 306", lat: 36.1682, lon: 129.3054 },
            { district: "북구", name: "창포지(마장지)", address: "포항시 북구 창흥로 117", lat: 36.0321, lon: 129.3587 },
            { district: "북구", name: "칠포그린로즈", address: "포항시 북구 흥해읍 암각화길 31", lat: 36.0824, lon: 129.3756 },
            { district: "북구", name: "한동대학교", address: "포항시 북구 흥해읍 남송리 3", lat: 36.1028, lon: 129.3880 },
            { district: "북구", name: "환호공원", address: "포항시 북구 환호동 347", lat: 36.0535, lon: 129.3752 },
            { district: "남구", name: "구룡포병포교차로길", address: "포항시 남구 구룡포읍 병포리", lat: 35.9704, lon: 129.4308 },
            { district: "남구", name: "영일대호수공원", address: "포항시 남구 행복길 75", lat: 36.0251, lon: 129.3554 },
            { district: "남구", name: "오어사", address: "포항시 남구 오천읍 항사리 산 28-14", lat: 35.9847, lon: 129.3802 },
            { district: "남구", name: "철길숲", address: "포항시 남구 대잠동 171-5", lat: 36.0148, lon: 129.3412 },
            { district: "남구", name: "청송대둘레길", address: "포항시 남구 행복길 58-10", lat: 36.0203, lon: 129.3457 },
            { district: "남구", name: "포항공과대학교", address: "포항시 남구 청암로 77", lat: 36.0128, lon: 129.3256 },
            { district: "남구", name: "포항시청", address: "포항시 남구 대잠동 1001", lat: 36.0195, lon: 129.3435 },
            { district: "남구", name: "효곡동", address: "포항시 남구 효자동길 30", lat: 36.0087, lon: 129.3301 }
        ];

        const greenPinIcon = L.divIcon({
            className: 'custom-pin',
            html: `<svg width="30" height="42" viewBox="0 0 30 42" fill="none"><path d="M15 0C6.71573 0 0 6.71573 0 15C0 26.25 15 42 15 42C15 42 30 26.25 30 15C30 6.71573 23.2843 0 15 0Z" fill="#a3e635"/><circle cx="15" cy="15" r="6" fill="white"/></svg>`,
            iconSize: [30, 42], iconAnchor: [15, 42], popupAnchor: [0, -40]
        });

        const bukguList = document.getElementById('bukgu-list');
        const namguList = document.getElementById('namgu-list');

        spots.forEach((spot) => {
            const marker = L.marker([spot.lat, spot.lon], { icon: greenPinIcon }).addTo(map);
            marker.bindPopup(`<div class="popup-content"><strong>${spot.name}</strong><br><span style="font-size:12px;">${spot.address}</span></div>`);
            
            const li = document.createElement('li');
            li.innerHTML = `<strong>${spot.name}</strong><br><small>${spot.address}</small>`;
            li.onclick = () => {
                map.flyTo([spot.lat, spot.lon], 16, { duration: 1 });
                marker.openPopup();
                window.scrollTo({ top: 0, behavior: 'smooth' });
            };
            (spot.district === "북구" ? bukguList : namguList).appendChild(li);
        });
    </script>
</body>
</html>
