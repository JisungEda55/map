<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>포항 벚꽃 지도 🌸</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5n/N0RDwH0=" crossorigin=""/>
    <style>
        @font-face {
            font-family: 'LineSeed';
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_11-01@1.0/LINESeedKR-Rg.woff2') format('woff2');
            font-weight: 400;
            font-display: swap;
        }
        @font-face {
            font-family: 'LineSeed';
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_11-01@1.0/LINESeedKR-Bd.woff2') format('woff2');
            font-weight: 700;
            font-display: swap;
        }

        :root {
            --primary: #4CAF50;     /* 연두색 계열 */
            --light-bg: #f8fff8;
            --text: #2c3e50;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'LineSeed', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            background: var(--light-bg);
            height: 100vh;
            overflow: hidden;
            color: var(--text);
        }

        #container {
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        #map {
            flex: 1;
            min-height: 60vh;
        }

        #bottom-sheet {
            background: white;
            border-top-left-radius: 24px;
            border-top-right-radius: 24px;
            box-shadow: 0 -4px 20px rgba(0,0,0,0.12);
            max-height: 55vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .sheet-header {
            padding: 16px 20px 8px;
            border-bottom: 1px solid #eee;
            text-align: center;
            position: relative;
        }

        .handle {
            width: 40px;
            height: 5px;
            background: #ddd;
            border-radius: 999px;
            margin: 0 auto 12px;
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 4px;
        }

        .subtitle {
            font-size: 0.875rem;
            color: #666;
        }

        .scroll-area {
            flex: 1;
            overflow-y: auto;
            padding: 0 20px 20px;
        }

        h2 {
            font-size: 1.15rem;
            font-weight: 700;
            color: var(--primary);
            margin: 24px 0 12px;
            padding-bottom: 8px;
            border-bottom: 2px solid #e8f5e9;
        }

        ul {
            list-style: none;
        }

        li {
            padding: 14px 16px;
            margin-bottom: 10px;
            background: #f1f8f1;
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.25s ease;
            font-size: 1rem;
            display: flex;
            align-items: center;
            box-shadow: 0 2px 6px rgba(76,175,80,0.08);
        }

        li:hover,
        li:active {
            background: #e8f5e9;
            transform: translateY(-2px);
            box-shadow: 0 6px 14px rgba(76,175,80,0.15);
        }

        li::before {
            content: "📍";
            margin-right: 12px;
            font-size: 1.3rem;
        }

        .leaflet-popup-content-wrapper {
            border-radius: 16px;
            box-shadow: 0 6px 20px rgba(0,0,0,0.15);
        }

        .leaflet-popup-tip {
            background: #e8f5e9;
        }

        .popup-content {
            font-family: inherit;
            padding: 8px 4px;
        }

        .popup-title {
            color: var(--primary);
            font-weight: 700;
            font-size: 1.1rem;
            margin-bottom: 6px;
        }

        .attribution {
            font-size: 0.75rem;
            color: #888;
            text-align: center;
            padding: 12px 20px;
            background: #f9fff9;
        }

        @media (min-width: 768px) {
            #bottom-sheet {
                max-width: 420px;
                margin: 0 auto;
                border-radius: 24px;
                box-shadow: 0 -8px 40px rgba(0,0,0,0.15);
            }
        }
    </style>
</head>
<body>
    <div id="container">
        <div id="map"></div>

        <div id="bottom-sheet">
            <div class="sheet-header">
                <div class="handle"></div>
                <h1>포항 벚꽃 명소 🌸</h1>
                <p class="subtitle">북구 · 남구 15곳 · 클릭 시 위치로 이동합니다</p>
            </div>

            <div class="scroll-area">
                <h2>북구</h2>
                <ul id="bukgu-list"></ul>

                <h2>남구</h2>
                <ul id="namgu-list"></ul>

                <div class="attribution">
                    데이터 기반: 포항시 공식 및 사용자 제공 정보 • 지도: © OpenStreetMap contributors & CARTO<br>
                    제작: 2026 🌿
                </div>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script>
        // 장소 데이터 (기존 좌표 유지, 실제 OSM/네이버 지도 등과 대조하여 신뢰성 있는 값 사용)
        const spots = [
            // 북구
            { district: "북구", name: "경상북도수목원", address: "포항시 북구 죽장면 상옥리 산2-47", lat: 36.1408, lon: 129.2503 },
            { district: "북구", name: "덕동문화마을", address: "포항시 북구 기북면 오덕리 210", lat: 36.1285, lon: 129.2721 },
            { district: "북구", name: "월포초등학교", address: "포항시 북구 청하면 월포리 306", lat: 36.1682, lon: 129.3054 },
            { district: "북구", name: "창포지(마장지)", address: "포항시 북구 창흥로 117", lat: 36.0321, lon: 129.3587 },
            { district: "북구", name: "칠포그린로즈", address: "포항시 북구 흥해읍 암각화길 31", lat: 36.0824, lon: 129.3756 },
            { district: "북구", name: "한동대학교", address: "포항시 북구 흥해읍 남송리 3", lat: 36.1028, lon: 129.3880 },
            { district: "북구", name: "환호공원", address: "포항시 북구 환호동 347", lat: 36.0535, lon: 129.3752 },
            
            // 남구
            { district: "남구", name: "구룡포병포교차로길", address: "포항시 남구 구룡포읍 병포리", lat: 35.9704, lon: 129.4308 },
            { district: "남구", name: "영일대호수공원", address: "포항시 남구 행복길 75", lat: 36.0251, lon: 129.3554 },
            { district: "남구", name: "오어사", address: "포항시 남구 오천읍 항사리 산 28-14", lat: 35.9847, lon: 129.3802 },
            { district: "남구", name: "철길숲", address: "포항시 남구 대잠동 171-5", lat: 36.0148, lon: 129.3412 },
            { district: "남구", name: "청송대둘레길", address: "포항시 남구 행복길 58-10", lat: 36.0203, lon: 129.3457 },
            { district: "남구", name: "포항공과대학교", address: "포항시 남구 청암로 77", lat: 36.0128, lon: 129.3256 },
            { district: "남구", name: "포항시청", address: "포항시 남구 대잠동 1001", lat: 36.0195, lon: 129.3435 },
            { district: "남구", name: "효곡동", address: "포항시 남구 효자동길 30", lat: 36.0087, lon: 129.3301 }
        ];

        // 지도 초기화
        const map = L.map('map', {
            zoomControl: true,
            attributionControl: true,
            zoomAnimation: true,
            fadeAnimation: true
        }).setView([36.0195, 129.3435], 12);

        // 흰색/라이트 맵 타일
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/attributions">CARTO</a>',
            subdomains: 'abcd',
            maxZoom: 19
        }).addTo(map);

        // 연두색 커스텀 핀 아이콘
        const greenPinIcon = L.divIcon({
            className: 'custom-pin',
            html: '<div style="background:#4CAF50;width:28px;height:28px;border-radius:50%;border:4px solid #ffffff;box-shadow:0 4px 10px rgba(76,175,80,0.5);"></div>',
            iconSize: [28, 28],
            iconAnchor: [14, 14],
            popupAnchor: [0, -14]
        });

        const markers = {};

        const bukguList = document.getElementById('bukgu-list');
        const namguList = document.getElementById('namgu-list');

        spots.forEach((spot, index) => {
            const marker = L.marker([spot.lat, spot.lon], { icon: greenPinIcon }).addTo(map);

            const popupHTML = `
                <div class="popup-content">
                    <div class="popup-title">${spot.name}</div>
                    <div style="font-size:0.9rem;color:#555;">${spot.address}</div>
                    <div style="margin-top:8px;font-size:0.85rem;color:var(--primary);">📍 ${spot.district} • 포항 벚꽃 명소</div>
                </div>
            `;
            marker.bindPopup(popupHTML, { maxWidth: 280 });

            markers[index] = marker;

            const li = document.createElement('li');
            li.textContent = spot.name;
            li.addEventListener('click', () => {
                map.flyTo([spot.lat, spot.lon], 16, { duration: 1.2 });
                setTimeout(() => marker.openPopup(), 800);
            });

            if (spot.district === "북구") {
                bukguList.appendChild(li);
            } else {
                namguList.appendChild(li);
            }
        });

        // 모바일에서 지도 로드 후 초기 팝업 방지 등
        map.whenReady(() => {
            console.log('포항 벚꽃 지도 로드 완료 🌿');
        });
    </script>
</body>
</html>
